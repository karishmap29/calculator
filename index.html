<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- CSS only -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <!-- JavaScript Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/1a2591d7e0.js" crossorigin="anonymous"></script>
    <style>
        button {
            width: 50px;
            height: 50px;
        }
    </style>
</head>

<body>
    <div class="row ">
        <div class="col-4"></div>
        <div class="col-lg-4 col-md-6 col-sm-12 container border  border-dark  mt-5 p-3 "
            style="border-radius: 30px; background-color: grey; ">
            <h1 style="text-align: center;">Calculator</h1>
            <input type="text" class="form-control">

            <div class="row mt-3 ms-2">
                <div class="col-3">
                    <button class="btn btn-light border border-dark ">1</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light border border-dark">2</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light border border-dark">3</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light border border-dark"
                        style="background-color: rgb(232, 232, 76);">+</button>
                </div>
            </div>

            <div class="row mt-2 ms-2">
                <div class="col-3">
                    <button class="btn btn-light border border-dark">4</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light border border-dark">5</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light border border-dark">6</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light border border-dark "
                        style="background-color: rgb(232, 232, 76);">-</button>
                </div>
            </div>


            <div class="row mt-2 ms-2">
                <div class="col-3">
                    <button class="btn btn-light border border-dark">7</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light border border-dark">8</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light border border-dark">9</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light border border-dark "
                        style="background-color: rgb(232, 232, 76);">*</button>
                </div>
            </div>



            <div class="row mt-2 ms-2">
                <div class="col-3 ">
                    <button class="btn btn-light border border-dark bg-danger">CE</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light border border-dark">0</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light border border-dark">.</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light border border-dark"
                        style="background-color: rgb(232, 232, 76); ">/</button>
                </div>
            </div>


            <div class="row mt-2">
                <div class="col-12">
                    <button style="width:350px;margin-left: 20px;background-color: rgb(138, 190, 249); " class="btn btn-light border border-dark " >=</button>
                </div>
            </div>



            <div class="col-4"></div>
        </div>
        <div class="col-4"></div>


</body>

</html>
